automation:
  army_training:
    enabled: false
    quantity: 1000
    troop_type: infantry
  building_upgrade:
    enabled: false
    priority:
    - academy
    - barracks
    - warehouse
  gem_collect:
    army_count: 1
    army_type: infantry
    check_interval: 300
    collect_radius: 10
    enabled: false
    max_concurrent: 3
    min_level: 5
  resource_collect:
    enabled: false
    interval: 36000
    max_storage_percent: 90
interaction:
  debug_overlay: true
  detection_fps: 2
  preview_enabled: true
logging:
  backup_count: 5
  file: logs/rok_assistant.log
  level: INFO
  max_size: 10485760
model:
  confidence: 0.6
  device: cpu
  input_size: 640
  iou_threshold: 0.45
  path: models/current/rok_detector.pt
plugins:
  enabled: true
  search_paths:
  - plugins
safety:
  click_duration: 0.1
  max_actions_per_minute: 30
  max_delay: 0.3
  min_delay: 0.05
  random_offset: 5
window:
  game_path: C:/个人应用/rok/download/launcher.exe
  process_name: RiseofKingdoms.exe
  title: 万国觉醒
